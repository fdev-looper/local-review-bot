<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReviewBot — AI-Powered Place Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3d;
    --accent: #f0c040;
    --accent2: #e05c5c;
    --accent3: #5ce0b0;
    --text: #e8e8f0;
    --muted: #7070a0;
    --card-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 20px;
    position: relative; z-index: 1;
  }

  /* ── Header ── */
  header {
    padding: 52px 0 36px;
    text-align: center;
  }

  .logo-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 22px;
  }
  .logo-badge span { width:6px; height:6px; background:var(--accent); border-radius:50%; display:inline-block; animation: pulse 2s infinite; }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.6rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  h1 em { color: var(--accent); font-style: normal; }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    margin-top: 12px;
    max-width: 440px;
    margin-inline: auto;
  }

  /* ── Search Bar ── */
  .search-wrap {
    margin: 36px 0 0;
    display: flex; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 8px 8px 8px 20px;
    transition: border-color 0.2s;
  }
  .search-wrap:focus-within { border-color: var(--accent); }

  #searchInput {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-width: 0;
  }
  #searchInput::placeholder { color: var(--muted); }

  #searchBtn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 9px;
    padding: 11px 22px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  #searchBtn:hover { opacity: 0.88; transform: scale(0.98); }
  #searchBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── Status / Loader ── */
  #status {
    text-align: center;
    padding: 28px 0;
    color: var(--muted);
    font-size: 14px;
    display: none;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  .status-step { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── Error ── */
  #errorBox {
    background: rgba(224,92,92,0.1);
    border: 1px solid rgba(224,92,92,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--accent2);
    font-size: 14px;
    display: none;
    margin-top: 24px;
  }

  /* ── Results ── */
  #results { display: none; margin-top: 36px; padding-bottom: 60px; }

  /* Place header card */
  .place-card {
    display: flex; gap: 18px; align-items: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease both;
  }
  .place-thumb {
    width: 72px; height: 72px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--surface2);
  }
  .place-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .place-meta {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-top: 8px;
    font-size: 13px; color: var(--muted);
  }
  .stars { color: var(--accent); font-size: 14px; }
  .rating-val { color: var(--text); font-weight: 500; }

  /* AI Summary card */
  .summary-card {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border: 1px solid #2a3060;
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    animation: fadeUp 0.4s 0.1s ease both;
    position: relative;
    overflow: hidden;
  }
  .summary-card::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(240,192,64,0.08) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .summary-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  .summary-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }
  .ai-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 100px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .ai-badge.pollinations { background: rgba(92,224,176,0.12); color: var(--accent3); border: 1px solid rgba(92,224,176,0.2); }
  .ai-badge.local { background: rgba(240,192,64,0.12); color: var(--accent); border: 1px solid rgba(240,192,64,0.2); }
  .ai-badge.gemini { background: rgba(138,92,246,0.12); color: #b87fff; border: 1px solid rgba(138,92,246,0.2); }

  .summary-body {
    font-size: 14px;
    line-height: 1.8;
    color: #c8c8e0;
  }
  .summary-body strong { color: var(--text); }
  .summary-body h3 {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 18px 0 8px;
  }
  .summary-body h3:first-child { margin-top: 0; }
  .summary-body ul { padding-left: 0; list-style: none; }
  .summary-body ul li { padding: 4px 0 4px 18px; position: relative; }
  .summary-body ul li::before { content: '›'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
  .summary-body p { margin-bottom: 10px; }

  /* Score bar */
  .score-row {
    display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap;
  }
  .score-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .score-chip .chip-label { color: var(--muted); font-size: 11px; }
  .score-chip .chip-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .chip-pos { color: var(--accent3); }
  .chip-neg { color: var(--accent2); }

  /* Section label */
  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Reviews grid */
  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    animation: fadeUp 0.4s 0.2s ease both;
  }
  .review-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .review-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .review-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .reviewer { font-size: 13px; font-weight: 500; color: var(--text); }
  .review-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .review-stars { font-size: 13px; }
  .review-text { font-size: 13px; line-height: 1.6; color: #a0a0c0; }

  /* Rating pill */
  .r1, .r2 { color: var(--accent2); }
  .r3 { color: var(--accent); }
  .r4, .r5 { color: var(--accent3); }

  /* Animations */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 560px) {
    .place-card { flex-direction: column; }
    .reviews-grid { grid-template-columns: 1fr; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-badge"><span></span> Review Intelligence</div>
    <h1>Know Before<br>You <em>Go.</em></h1>
    <p class="subtitle">AI-powered analysis of real Google reviews — no fluff, just signal.</p>

    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search a place… e.g. Starbucks New York" autocomplete="off" />
      <button id="searchBtn">Analyze ↗</button>
    </div>
  </header>

  <div id="status">
    <div class="spinner"></div>
    <div id="statusText">Fetching reviews…</div>
    <div class="status-step" id="statusStep"></div>
  </div>

  <div id="errorBox"></div>

  <div id="results">
    <div class="place-card" id="placeCard"></div>
    <div class="summary-card" id="summaryCard"></div>
    <div class="section-label" style="margin-top:8px">What people are saying</div>
    <div class="reviews-grid" id="reviewsGrid"></div>
  </div>
</div>

<script>
const WORKER_URL = 'https://review-bot5.giggabytelelo.workers.dev';

const searchBtn   = document.getElementById('searchBtn');
const searchInput = document.getElementById('searchInput');
const statusEl    = document.getElementById('status');
const statusText  = document.getElementById('statusText');
const statusStep  = document.getElementById('statusStep');
const errorBox    = document.getElementById('errorBox');
const resultsEl   = document.getElementById('results');

searchBtn.addEventListener('click', run);
searchInput.addEventListener('keydown', e => e.key === 'Enter' && run());

function setStatus(msg, step = '') {
  statusEl.style.display = 'block';
  statusText.textContent = msg;
  statusStep.textContent = step;
}
function showError(msg) {
  errorBox.textContent = '⚠ ' + msg;
  errorBox.style.display = 'block';
}
function hide(el) { el.style.display = 'none'; }

// ── Star renderer ─────────────────────────────────────────────────────────────
function stars(r) {
  const full = Math.round(r);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}
function ratingClass(r) { return r <= 2 ? 'r' + r : r === 3 ? 'r3' : r <= 5 ? 'r' + r : 'r4'; }

// ── LOCAL JSON analysis fallback ──────────────────────────────────────────────
function analyzeLocally(data) {
  const { meta, reviews } = data;
  if (!reviews || reviews.length === 0) return null;

  const good = reviews.filter(r => r.rating >= 4);
  const bad  = reviews.filter(r => r.rating <= 2);
  const avgRating = reviews.reduce((s, r) => s + r.rating, 0) / reviews.length;

  // Extract keyword themes from text
  const keywords = {
    positive: ['atmosphere','ambiance','amazing','great','love','beautiful','fantastic','friendly','staff','recommend','best','delicious','excellent','wonderful','stunning'],
    negative: ['slow','loud','wait','terrible','worst','rude','overpriced','disappointing','cold','wrong','awful','bad','noise','expensive','never coming back']
  };

  const posMatches = {};
  const negMatches = {};

  reviews.forEach(r => {
    const txt = (r.text || '').toLowerCase();
    keywords.positive.forEach(k => { if (txt.includes(k)) posMatches[k] = (posMatches[k]||0)+1; });
    keywords.negative.forEach(k => { if (txt.includes(k)) negMatches[k] = (negMatches[k]||0)+1; });
  });

  const topPos = Object.entries(posMatches).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);
  const topNeg = Object.entries(negMatches).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>k);

  const sentiment = avgRating >= 4 ? 'mostly positive' : avgRating >= 3 ? 'mixed' : 'predominantly negative';
  const posRate = Math.round(good.length / reviews.length * 100);
  const negRate = Math.round(bad.length  / reviews.length * 100);

  const positiveSnippets = good.slice(0,2).map(r => r.text ? `"${r.text.slice(0,80)}…"` : '').filter(Boolean);
  const negativeSnippets = bad.slice(0,2).map(r => r.text ? `"${r.text.slice(0,80)}…"` : '').filter(Boolean);

  return {
    source: 'local',
    posRate, negRate, sentiment, topPos, topNeg,
    positiveSnippets, negativeSnippets,
    avgRating: avgRating.toFixed(1),
    totalSampled: reviews.length
  };
}

function renderLocalSummary(analysis, meta) {
  const { posRate, negRate, sentiment, topPos, topNeg, positiveSnippets, negativeSnippets, avgRating } = analysis;

  const verdict = posRate >= 70
    ? `✅ Worth visiting — most guests leave happy.`
    : posRate >= 50
    ? `⚖️ Mixed bag — read reviews before deciding.`
    : `❌ Proceed with caution — complaints outweigh praise.`;

  let html = `
    <div class="score-row">
      <div class="score-chip"><div><div class="chip-label">Positive</div><div class="chip-val chip-pos">${posRate}%</div></div></div>
      <div class="score-chip"><div><div class="chip-label">Negative</div><div class="chip-val chip-neg">${negRate}%</div></div></div>
      <div class="score-chip"><div><div class="chip-label">Sample Avg</div><div class="chip-val">${avgRating}★</div></div></div>
    </div>
    <h3 style="margin-top:20px">Overall Sentiment</h3>
    <p>Reviews for <strong>${meta.placeName}</strong> are <strong>${sentiment}</strong> — ${posRate}% of sampled reviews rate 4★ or higher.</p>
  `;
  if (topPos.length) {
    html += `<h3>What People Love ❤️</h3><ul>${topPos.map(k=>`<li>Frequently praised for <strong>${k}</strong></li>`).join('')}</ul>`;
  }
  if (topNeg.length) {
    html += `<h3>Common Complaints ⚠️</h3><ul>${topNeg.map(k=>`<li>Recurring mentions of <strong>${k}</strong></li>`).join('')}</ul>`;
  }
  if (positiveSnippets.length) {
    html += `<h3>Visitor Highlights 💡</h3><ul>${positiveSnippets.map(s=>`<li style="font-style:italic;color:#8888b0">${s}</li>`).join('')}</ul>`;
  }
  html += `<h3>Verdict 🏆</h3><p><strong>${verdict}</strong></p>`;

  return html;
}

// ── Pollinations AI (free, no key) ────────────────────────────────────────────
async function analyzeWithPollinations(placeName, reviews, meta) {
  const reviewsText = reviews.map(r => `[${r.rating}★] ${r.author}: ${r.text?.slice(0,120) || ''}`).join('\n');
  const prompt = `You are a concise local guide. Analyze these Google reviews for "${meta.placeName || placeName}" and write a COMPLETE structured report.

Reviews:
${reviewsText}

Overall: ${meta.rating}/5 (${meta.totalReviews} total reviews)

Write EXACTLY this structure:

**1. Overall Sentiment**
(1-2 lines)

**2. What People Love ❤️**
• point 1
• point 2

**3. Common Complaints ⚠️**
• point 1
• point 2

**4. Visitor Tips 💡**
• tip 1
• tip 2
• tip 3

**5. AI Verdict 🏆**
(one bold recommendation sentence)

Be direct. Use emojis. Complete all 5 sections.`;

  const encodedPrompt = encodeURIComponent(prompt);
  const url = `https://text.pollinations.ai/${encodedPrompt}?model=openai&seed=42&private=true`;

  const res = await fetch(url, { signal: AbortSignal.timeout(18000) });
  if (!res.ok) throw new Error(`Pollinations HTTP ${res.status}`);
  const text = await res.text();
  if (!text || text.length < 50) throw new Error('Empty response from Pollinations');
  return text;
}

// ── Render markdown-ish AI text ───────────────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<h3>$1</h3>')
    .replace(/^•\s+(.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hup])/gm, '')
    .split('\n').map(line => {
      if (!line.startsWith('<')) return line ? `<p>${line}</p>` : '';
      return line;
    }).join('');
}

// ── Main run ──────────────────────────────────────────────────────────────────
async function run() {
  const place = searchInput.value.trim();
  if (!place) return;

  hide(errorBox); hide(resultsEl);
  errorBox.style.display = 'none';
  resultsEl.style.display = 'none';
  searchBtn.disabled = true;

  setStatus('Fetching reviews…', 'Contacting Google Maps data…');

  let data;
  try {
    const res = await fetch(`${WORKER_URL}/search?place=${encodeURIComponent(place)}`);
    data = await res.json();
    if (!data.success) throw new Error(data.error || 'Worker returned an error');
  } catch (err) {
    hide(statusEl);
    searchBtn.disabled = false;
    showError(err.message);
    return;
  }

  const { reviews, summary: workerSummary, modelUsed } = data;
  const { meta } = reviews;

  // ── Render place card ──
  document.getElementById('placeCard').innerHTML = `
    ${meta.thumbnail ? `<img class="place-thumb" src="${meta.thumbnail}" alt="${meta.placeName}" onerror="this.style.display='none'">` : ''}
    <div class="place-info">
      <h2>${meta.placeName}</h2>
      <div class="place-meta">
        <span><span class="stars">${stars(meta.rating)}</span> <span class="rating-val">${meta.rating}</span></span>
        <span>${(meta.totalReviews || 0).toLocaleString()} reviews</span>
        ${meta.address ? `<span>${meta.address}</span>` : ''}
      </div>
    </div>
  `;

  // ── Determine AI summary source ──
  let summaryHTML = '';
  let aiSource = '';

  // Priority 1: Gemini via worker (if it actually worked)
  if (workerSummary && modelUsed && modelUsed !== 'none') {
    summaryHTML = renderMarkdown(workerSummary);
    aiSource = 'gemini';
    setStatus('Rendering summary…', `Powered by ${modelUsed}`);
  } else {
    // Priority 2: Pollinations (free, no key)
    setStatus('Analyzing reviews…', 'Using Pollinations AI (free)…');
    try {
      const pollinationsText = await analyzeWithPollinations(place, reviews.reviews, meta);
      summaryHTML = renderMarkdown(pollinationsText);
      aiSource = 'pollinations';
    } catch (polErr) {
      console.warn('Pollinations failed:', polErr.message);
      // Priority 3: Local JSON analysis
      setStatus('Analyzing locally…', 'AI unavailable — using smart fallback…');
      const localAnalysis = analyzeLocally(reviews);
      if (localAnalysis) {
        summaryHTML = renderLocalSummary(localAnalysis, meta);
        aiSource = 'local';
      } else {
        summaryHTML = '<p>Could not generate summary for this place.</p>';
        aiSource = 'local';
      }
    }
  }

  // ── Render summary card ──
  const badgeMap = {
    gemini:      { cls: 'gemini',      label: 'Gemini AI' },
    pollinations:{ cls: 'pollinations',label: 'Pollinations AI' },
    local:       { cls: 'local',       label: 'Smart Analysis' },
  };
  const badge = badgeMap[aiSource] || badgeMap.local;

  document.getElementById('summaryCard').innerHTML = `
    <div class="summary-header">
      <div class="summary-title">✦ AI Summary</div>
      <span class="ai-badge ${badge.cls}">${badge.label}</span>
    </div>
    <div class="summary-body">${summaryHTML}</div>
  `;

  // ── Render reviews grid ──
  const grid = document.getElementById('reviewsGrid');
  grid.innerHTML = reviews.reviews.map(r => `
    <div class="review-card">
      <div class="review-top">
        <div>
          <div class="reviewer">${r.author}</div>
          <div class="review-date">${r.date}</div>
        </div>
        <div class="review-stars ${ratingClass(r.rating)}">${stars(r.rating)}</div>
      </div>
      <div class="review-text">${r.text ? r.text.slice(0, 200) + (r.text.length > 200 ? '…' : '') : 'No text'}</div>
    </div>
  `).join('');

  hide(statusEl);
  resultsEl.style.display = 'block';
  searchBtn.disabled = false;
}
</script>
</body>
</html>
